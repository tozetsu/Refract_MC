appId: com.refract.app
productName: Refract
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json}'
asarUnpack:
  - resources/**
win:
  executableName: refract
  icon: build/icon.png
  # Code signing: set CSC_LINK (base64-encoded .p12) and CSC_KEY_PASSWORD in
  # GitHub Secrets. electron-builder picks them up automatically.
  # For Azure Trusted Signing (free for open-source), set AZURE_TENANT_ID,
  # AZURE_CLIENT_ID, AZURE_CLIENT_SECRET and use the sign hook below.
  # sign: ./build/sign-windows.js
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  icon: build/icon.png
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  # Notarization: set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # in GitHub Secrets. electron-builder reads these automatically.
  # notarize:
  #   teamId: XXXXXXXXXX
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility
  artifactName: ${productName}-${version}.${ext}
publish:
  provider: github
  owner: RefractMC
  repo: Refract_MC
  releaseType: draft
