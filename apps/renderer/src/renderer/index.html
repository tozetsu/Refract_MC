<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refract Launcher</title>
    <style>
      :root {
        color-scheme: dark;
        --startup-bg: #08070d;
        --startup-panel: #12101a;
        --startup-line: rgba(255, 255, 255, .10);
        --startup-text: #f4f0ff;
        --startup-muted: #918aa3;
        --startup-accent: #9a6cff;
        --startup-diamond: #4fb8e8;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--startup-bg);
      }

      #startup-loader {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, .035), transparent 34%),
          radial-gradient(circle at 50% 42%, rgba(154, 108, 255, .13), transparent 34%),
          var(--startup-bg);
        color: var(--startup-text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      #startup-loader[data-state="done"] {
        opacity: 0;
        pointer-events: none;
      }

      .startup-mark {
        width: min(260px, calc(100vw - 48px));
        display: grid;
        justify-items: center;
        gap: 18px;
      }

      .startup-logo {
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 1px solid var(--startup-line);
        border-radius: 14px;
        background: var(--startup-panel);
        box-shadow: 0 18px 60px rgba(0, 0, 0, .35);
      }

      .startup-logo-img {
        width: 42px;
        height: 42px;
        object-fit: contain;
        display: block;
        animation: startup-pulse 1100ms ease-in-out infinite;
      }

      .startup-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0;
      }

      .startup-subtitle {
        margin: -8px 0 0;
        color: var(--startup-muted);
        font-size: 12px;
        line-height: 1.3;
        letter-spacing: 0;
      }

      .startup-bar {
        width: 100%;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, .08);
      }

      .startup-bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--startup-accent), var(--startup-diamond));
        animation: startup-slide 1200ms cubic-bezier(.4, 0, .2, 1) infinite;
      }

      @keyframes startup-pulse {
        0%, 100% { transform: scale(.94); opacity: .82; }
        50% { transform: scale(1); opacity: 1; }
      }

      @keyframes startup-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(260%); }
      }

      @media (prefers-reduced-motion: reduce) {
        #startup-loader,
        .startup-logo-img,
        .startup-bar::before {
          animation: none;
          transition: none;
        }
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --startup-bg: #f4f5f8;
          --startup-panel: #ffffff;
          --startup-line: rgba(17, 24, 39, .12);
          --startup-text: #111827;
          --startup-muted: #64748b;
        }

        #startup-loader {
          background:
            linear-gradient(180deg, rgba(255, 255, 255, .5), transparent 34%),
            radial-gradient(circle at 50% 42%, rgba(79, 70, 229, .10), transparent 34%),
            var(--startup-bg);
        }
      }
    </style>
  </head>
  <body>
    <div id="startup-loader" role="status" aria-live="polite" aria-label="Loading Refract">
      <div class="startup-mark">
        <div class="startup-logo" aria-hidden="true">
          <img class="startup-logo-img" src="/src/assets/refract-logo.png" alt="" />
        </div>
        <h1 class="startup-title">Refract</h1>
        <p class="startup-subtitle">Loading launcher</p>
        <div class="startup-bar" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
