<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refract Update</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #111318;
        color: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(116, 92, 255, 0.2), transparent 34rem),
          #111318;
      }

      main {
        width: min(420px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #b9c0cf;
        font-size: 14px;
        line-height: 1.5;
      }

      .progress {
        height: 8px;
        margin: 24px 0 12px;
        overflow: hidden;
        border-radius: 999px;
        background: #252a35;
      }

      .bar {
        width: 8%;
        height: 100%;
        border-radius: inherit;
        background: #7c6cff;
        transition: width 160ms ease;
      }

      .meta {
        min-height: 22px;
        font-size: 13px;
        color: #d7dbea;
      }

      .error {
        margin-top: 18px;
        color: #ffb4ab;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Updating Refract</h1>
      <p>This one-time update installs the new Refract desktop app and keeps your existing data.</p>
      <div class="progress" aria-label="Update progress">
        <div id="bar" class="bar"></div>
      </div>
      <div id="status" class="meta">Starting updater...</div>
      <div id="error" class="error" hidden></div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
