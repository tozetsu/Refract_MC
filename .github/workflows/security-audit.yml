name: Security Audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: JavaScript dependency audit
        run: pnpm audit

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Rust dependency audit
        working-directory: apps/tauri/src-tauri
        # glib is pulled in by Tauri's Linux WebKitGTK/GTK3 backend through wry.
        # The patched glib line starts at 0.20, but the current upstream GTK3
        # stack is capped at glib 0.18.5, so this cannot be fixed directly here.
        #
        # RUSTSEC-2026-0194 / RUSTSEC-2026-0195 (quick-xml 0.39, DoS-class):
        # transitive via plist -> tauri-utils. The fix line is quick-xml 0.41,
        # but plist (1.9.0, and its master as of 2026-07-02) still requires
        # 0.39, so there is no upgrade path yet. plist only parses macOS
        # .plist metadata here (trusted input), so exposure is minimal.
        # Drop these ignores once plist releases with quick-xml >= 0.41.
        run: cargo audit --ignore RUSTSEC-2024-0429 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

      - name: Rust check
        working-directory: apps/tauri/src-tauri
        run: cargo check

      - name: Renderer typecheck
        run: pnpm --filter @refract/renderer typecheck
