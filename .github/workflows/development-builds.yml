name: Development Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: refract-windows
            bundles: |
              apps/tauri/src-tauri/target/release/bundle/nsis/*.exe
              apps/tauri/src-tauri/target/release/bundle/msi/*.msi
          - name: macOS Apple Silicon
            os: macos-latest
            artifact: refract-macos-arm64
            bundles: |
              apps/tauri/src-tauri/target/release/bundle/dmg/*.dmg
              apps/tauri/src-tauri/target/release/bundle/macos/*.app.tar.gz
          - name: macOS Intel
            os: macos-15-intel
            artifact: refract-macos-intel
            bundles: |
              apps/tauri/src-tauri/target/release/bundle/dmg/*.dmg
              apps/tauri/src-tauri/target/release/bundle/macos/*.app.tar.gz
          - name: Linux
            os: ubuntu-latest
            artifact: refract-linux
            bundles: |
              apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              apps/tauri/src-tauri/target/release/bundle/deb/*.deb
              apps/tauri/src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # XProtect's behavioral scanner intermittently locks the DMG staging dir,
      # making `hdiutil create` fail with "Resource busy" — see
      # https://github.com/actions/runner-images/issues/7522
      - name: Stop XProtect (hdiutil "Resource busy" workaround)
        if: runner.os == 'macOS'
        run: |
          sudo pkill -9 XProtect >/dev/null 2>&1 || true
          while pgrep XProtect >/dev/null; do sleep 3; done

      - name: Build development bundle
        run: pnpm --filter @refract/tauri-poc build --verbose

      - name: Upload development artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error
          retention-days: 14
