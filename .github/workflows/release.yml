name: Release (Legacy Electron)

on:
  push:
    tags:
      - 'electron-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        env:
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
        run: pnpm --filter @refract/app build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing via certificate (.p12 / .pfx encoded as base64):
          #   CSC_LINK: ${{ secrets.CSC_LINK }}
          #   CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: pnpm --filter @refract/app exec electron-builder --win --publish always

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple Developer certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build app
        env:
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
        run: pnpm --filter @refract/app build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Notarization (requires Apple Developer account):
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --filter @refract/app exec electron-builder --mac --publish always

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        run: sudo apt-get install -y rpm fakeroot

      - name: Build app
        env:
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
        run: pnpm --filter @refract/app build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @refract/app exec electron-builder --linux AppImage deb --publish always

  release-notes:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section and update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./apps/renderer/package.json').version")
          TAG="v${VERSION}"

          # Extract the section for this version from CHANGELOG.md
          awk "/^## ${VERSION}$/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release-notes.md

          # Wait for the release to exist (electron-builder creates it during publish)
          for i in $(seq 1 12); do
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 && break
            echo "Waiting for release $TAG to be created... ($i/12)"
            sleep 10
          done

          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --notes-file release-notes.md
