name: Release (Tauri)

# Push a release tag (e.g. v1.1.4) to build, sign, and publish a release with
# the auto-updater manifest.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.1.4)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            args: ""
          - name: macOS Intel
            platform: macos-15-intel
            args: ""
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo secrets — Settings → Secrets and variables → Actions:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Baked into the Rust binary at compile time via option_env! in analytics.rs.
          # Without this, analytics stays inert in released Tauri builds.
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
        with:
          projectPath: apps/tauri
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Refract ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer below. Installed apps auto-update from this release once it's published."
          # Draft so you review before it goes live. Auto-update only serves a
          # PUBLISHED release marked "latest" — publish the draft to roll it out.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "Refract_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}
