name: Release (Tauri)

# Push a release tag (e.g. v1.1.4) to build, sign, and publish a release with
# the auto-updater manifest.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.1.4)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      # `secrets` isn't allowed in step-level `if`, so surface presence flags here.
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            args: ""
          - name: macOS Intel
            platform: macos-15-intel
            args: ""
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # XProtect's behavioral scanner intermittently locks the DMG staging dir,
      # making `hdiutil create` fail with "Resource busy" — see
      # https://github.com/actions/runner-images/issues/7522
      - name: Stop XProtect (hdiutil "Resource busy" workaround)
        if: runner.os == 'macOS'
        run: |
          sudo pkill -9 XProtect >/dev/null 2>&1 || true
          while pgrep XProtect >/dev/null; do sleep 3; done

      # OS code signing — both steps are no-ops until the corresponding secrets
      # exist, so releases stay unsigned-but-working before the accounts are set
      # up. See apps/tauri/RELEASING.md § "OS code signing & notarization".
      - name: Enable Windows code signing (Azure Trusted Signing)
        if: runner.os == 'Windows' && env.HAS_AZURE_SIGNING == 'true'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_SIGNING_PROFILE: ${{ secrets.AZURE_SIGNING_PROFILE }}
        run: |
          cargo install trusted-signing-cli --locked
          # The endpoint/account/profile are account-specific, so the signCommand
          # overlay is generated here instead of living in tauri.conf.json.
          $overlay = @{ bundle = @{ windows = @{ signCommand = "trusted-signing-cli -e $env:AZURE_SIGNING_ENDPOINT -a $env:AZURE_SIGNING_ACCOUNT -c $env:AZURE_SIGNING_PROFILE %1" } } } | ConvertTo-Json -Depth 5
          Set-Content -Path "apps/tauri/src-tauri/tauri.codesign.conf.json" -Value $overlay -Encoding utf8
          "TAURI_SIGN_ARGS=--config src-tauri/tauri.codesign.conf.json" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # trusted-signing-cli reads these at sign time (invoked by the build step)
          "AZURE_TENANT_ID=$env:AZURE_TENANT_ID" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_CLIENT_ID=$env:AZURE_CLIENT_ID" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "AZURE_CLIENT_SECRET=$env:AZURE_CLIENT_SECRET" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Enable macOS code signing & notarization
        if: runner.os == 'macOS' && env.HAS_APPLE_SIGNING == 'true'
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NOTARY_ID: ${{ secrets.APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Exported via GITHUB_ENV (not set directly on the build step) so that
        # tauri's bundler never sees empty-string APPLE_* vars when the secrets
        # are absent — it treats "set but empty" as "try to sign" and fails.
        run: |
          {
            printf 'APPLE_CERTIFICATE<<EOF_REFRACT\n%s\nEOF_REFRACT\n' "$CERT"
            printf 'APPLE_CERTIFICATE_PASSWORD<<EOF_REFRACT\n%s\nEOF_REFRACT\n' "$CERT_PASSWORD"
            printf 'APPLE_SIGNING_IDENTITY<<EOF_REFRACT\n%s\nEOF_REFRACT\n' "$IDENTITY"
            printf 'APPLE_ID<<EOF_REFRACT\n%s\nEOF_REFRACT\n' "$NOTARY_ID"
            printf 'APPLE_PASSWORD<<EOF_REFRACT\n%s\nEOF_REFRACT\n' "$NOTARY_PASSWORD"
            printf 'APPLE_TEAM_ID<<EOF_REFRACT\n%s\nEOF_REFRACT\n' "$TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo secrets — Settings → Secrets and variables → Actions:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Baked into the Rust binary at compile time via option_env! in analytics.rs.
          # Without this, analytics stays inert in released Tauri builds.
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
          # Baked into the Rust binary at compile time via option_env! in config.rs.
          # User-provided Settings keys still override this for local testing.
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        with:
          projectPath: apps/tauri
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Refract ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Download the installer below. Installed apps auto-update from this release once it's published."
          # Draft so you review before it goes live. Auto-update only serves a
          # PUBLISHED release marked "latest" — publish the draft to roll it out.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "Refract_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }} ${{ env.TAURI_SIGN_ARGS }}

      - name: Prepare stable release filenames
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          BUNDLE="apps/tauri/src-tauri/target/release/bundle"

          case "${{ runner.os }}" in
            Windows)
              cp "$BUNDLE/nsis/Refract_${VERSION}_x64-setup.exe" \
                 "Refract-Windows-x64.exe"
              gh release upload "$TAG" "Refract-Windows-x64.exe" --clobber
              ;;

            macOS)
              cp "$BUNDLE/dmg/Refract_${VERSION}_aarch64.dmg" \
                 "Refract-macOS-arm64.dmg" 2>/dev/null || true

              cp "$BUNDLE/dmg/Refract_${VERSION}_x64.dmg" \
                 "Refract-macOS-x64.dmg" 2>/dev/null || true
              gh release upload "$TAG" Refract-macOS-*.dmg --clobber
              ;;

            Linux)
              cp "$BUNDLE/appimage/Refract_${VERSION}_amd64.AppImage" \
                 "Refract-Linux-x86_64.AppImage"

              cp "$BUNDLE/deb/Refract_${VERSION}_amd64.deb" \
                 "Refract-Linux-amd64.deb"

              rpm_files=("$BUNDLE"/rpm/*.rpm)
              if [[ ${#rpm_files[@]} -ne 1 || ! -f "${rpm_files[0]}" ]]; then
                echo "Expected exactly one RPM bundle, found ${#rpm_files[@]}" >&2
                exit 1
              fi
              cp "${rpm_files[0]}" "Refract-Linux-x86_64.rpm"

              gh release upload "$TAG" \
                "Refract-Linux-x86_64.AppImage" \
                "Refract-Linux-amd64.deb" \
                "Refract-Linux-x86_64.rpm" \
                --clobber
              ;;
          esac

  # Runs once after all platform builds: point the updater manifest at the
  # stable filenames, then drop the versioned duplicates. The signatures in
  # latest.json stay valid because the stable files are byte-identical copies.
  # Skipped if any build failed, leaving a consistent versioned release.
  finalize:
    name: Finalize release assets
    needs: release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Rewrite updater manifest to stable filenames
        run: |
          set -euo pipefail
          BASE="https://github.com/${GH_REPO}/releases/download/${TAG}"

          gh release download "$TAG" --pattern latest.json

          jq --arg base "$BASE" '
            del(.platforms["windows-x86_64-msi"])
            | if .platforms["windows-x86_64"]        then .platforms["windows-x86_64"].url        = $base + "/Refract-Windows-x64.exe"       else . end
            | if .platforms["windows-x86_64-nsis"]   then .platforms["windows-x86_64-nsis"].url   = $base + "/Refract-Windows-x64.exe"       else . end
            | if .platforms["linux-x86_64"]          then .platforms["linux-x86_64"].url          = $base + "/Refract-Linux-x86_64.AppImage" else . end
            | if .platforms["linux-x86_64-appimage"] then .platforms["linux-x86_64-appimage"].url = $base + "/Refract-Linux-x86_64.AppImage" else . end
            | if .platforms["linux-x86_64-deb"]      then .platforms["linux-x86_64-deb"].url      = $base + "/Refract-Linux-amd64.deb"       else . end
            | if .platforms["linux-x86_64-rpm"]      then .platforms["linux-x86_64-rpm"].url      = $base + "/Refract-Linux-x86_64.rpm"      else . end
          ' latest.json > latest.fixed.json
          mv latest.fixed.json latest.json

          gh release upload "$TAG" latest.json --clobber

      - name: Delete versioned duplicate assets
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Every versioned asset name contains the version string; the stable
          # copies, app.tar.gz updater archives and latest.json never do.
          gh release view "$TAG" --json assets -q '.assets[].name' \
            | { grep -F "$VERSION" || true; } \
            | while read -r name; do
                gh release delete-asset "$TAG" "$name" -y
                echo "deleted $name"
              done

